name: Test GHCR Write Permissions

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-permissions:
    name: Test GHCR Write Access
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Test basic Docker operations
        run: |
          echo "Testing GHCR write permissions..."
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Image name: ${{ env.IMAGE_NAME }}"
          echo "Repository owner: ${{ github.repository_owner }}"
          echo "Actor: ${{ github.actor }}"
          
          # Test Docker info
          docker info
          
          # Test if we can create a simple manifest
          echo "Testing manifest creation..."
          echo '{"test": "permission-check"}' > test-manifest.json
          
      - name: Attempt to push a minimal test image
        run: |
          echo "Attempting to test GHCR push access..."
          
          # Create a minimal test image using a simple approach
          echo 'FROM alpine:latest
          CMD ["echo", "GHCR permission test"]' > Dockerfile.test
          
          # Try to build and push a minimal image to test permissions
          docker build -f Dockerfile.test -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-permission .
          
          # Test authentication by trying to push (this will likely fail at push step)
          echo "Testing push (this should show the exact permission error)..."
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-permission || echo "Push failed as expected - checking error"
          
      - name: Check repository and package access
        run: |
          echo "Checking repository access..."
          echo "Repository: ${{ github.repository }}"
          echo "Owner: ${{ github.repository_owner }}"
          
          # Try to list existing images if possible
          echo "Attempting to list existing packages..."
          # This might fail due to read permissions, which is informative
          
      - name: Summary of findings
        run: |
          echo "=== GHCR Permissions Test Summary ==="
          echo "1. Login: SUCCESS (if we got this far)"
          echo "2. Build operations: Should work"
          echo "3. Push operations: This is where permission errors occur"
          echo "4. If you see 'permission_denied: write_package', it's a repository-level GHCR config issue"
          echo "====================================="
          echo ""
          echo "Next steps:"
          echo "- Check repository Settings > Packages & Registries"
          echo "- Ensure GitHub Actions has write access to packages"
          echo "- Consider using a Personal Access Token with write:packages scope"